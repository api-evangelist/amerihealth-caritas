apis:
  - aid: amerihealth-caritas:patient-access-api
    name: AmeriHealth Caritas Patient Access FHIR API
    description: >-
      HL7 FHIR R4 (4.0.1) Patient Access API published to satisfy the CMS Interoperability and Patient Access final rule
      (CMS-9115-F). Provides member-authorized access to clinical, claims, encounter, coverage, medication,
      immunization, and demographic resources for the AmeriHealth Caritas family of Medicaid, CHIP, D-SNP, LTSS, and
      Marketplace health plans. Member data is protected by SMART on FHIR / OAuth 2.0 with PKCE; production access
      requires developer registration, app review, and member consent. Per-plan FHIR base URLs are exposed under
      api-ext.amerihealthcaritas.com keyed by a four-digit plan code (0100, 0500, 0900, 2400, 2600 confirmed public).
    humanURL: https://developer.amerihealthcaritas.com/
    baseURL: https://api-ext.amerihealthcaritas.com/0500/patient-api
    tags:
      - Patient Access
      - FHIR
      - SMART On FHIR
      - Medicaid
      - CMS
