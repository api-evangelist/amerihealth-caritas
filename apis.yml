  - aid: amerihealth-caritas:formulary-api
    name: AmeriHealth Caritas Formulary FHIR API
    description: >-
      HL7 FHIR R4 Formulary API published to satisfy CMS-9115-F drug formulary publication requirements for Medicaid
      managed care and D-SNP populations. Covered drug lists, tier information, and prior authorization indicators are
      exposed through FHIR MedicationKnowledge and List resources. Documented at developer.amerihealthcaritas.com as a
      public, no-authentication surface; the canonical public base URL is not separately published at
      api-ext.amerihealthcaritas.com and formulary resources are currently surfaced inside the Patient Access API under
      MedicationKnowledge / List.
    humanURL: https://developer.amerihealthcaritas.com/dvp/v1/apiadditionaldocsinfo/
    baseURL: https://api-ext.amerihealthcaritas.com/0500/patient-api
