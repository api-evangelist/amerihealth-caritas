aid: amerihealth-caritas
name: AmeriHealth Caritas
description: >-
  AmeriHealth Caritas is one of the largest Medicaid managed care organizations in the United States, serving roughly
  five million members across Medicaid, Children's Health Insurance Program (CHIP), dual-eligible Medicare-Medicaid
  (D-SNP), Medicare-Medicaid LTSS, and Marketplace lines of business across thirteen states plus the District of
  Columbia. The company is owned jointly by Independence Blue Cross (majority) and Blue Cross Blue Shield of Michigan,
  operates state health plans under brands such as Keystone First, Select Health of South Carolina, Blue Cross Complete
  of Michigan, AmeriHealth Caritas Next, AmeriHealth Caritas VIP Care, and PerformCare, and exposes a set of HL7 FHIR R4
  APIs through its developer portal at developer.amerihealthcaritas.com to satisfy the CMS Interoperability and Patient
  Access final rule (CMS-9115-F).
