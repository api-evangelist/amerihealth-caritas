        style: simple
      - name: _text
        in: query
        description: Search the contents of the resource's narrative using a fulltext search
        style: simple
      - name: status
        in: query
        description: preparation | in-progress | not-done | on-hold | stopped | completed | entered-in-error | unknown
        style: simple
